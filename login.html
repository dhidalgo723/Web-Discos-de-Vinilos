<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK - Login </title>
    <link rel="icon" type="image/jpg" href="img/icon.png">
    <link rel="stylesheet" href="loginstyle.css">
    <!-- el preconnect hace que optimice y ordene el navegador a establecer conexiones anticipadas con servidores externos -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="/img/cd.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>
    <script defer src="loginscript.js"></script>
    <div class="grain"></div>
    
    <div class="container">
        <div class="content">
            <div class="logo-container">
                <h1 class="logo">Discos y Vinilos KFK</h1>
                <div class="logo-underline"></div>
            </div>
            
            <div class="description">
                <p>Explora nuestro catalogo de música exclusiva y con alta calidad de sonido.</p>
                <p class="tagline">Súmergete en nuestro mundo audiolirical</p>
            </div>
            
            <div class="notify-section">
                <form>
                    <input type="email" placeholder="tu@email.com" class="email-input">
                    <input type="password" placeholder="tu contraseña" class="email-input">
                    <img src="img/show-password.png" alt="Show Password" height="30px" class="show-password">
                    <button class="notify-btn" type="submit">Iniciar Sesión</button>
                </form>
            </div>
            
            <div class="otras-web">
                <a href="rap.html" class="otras-web">Rap</a>
                <span class="separator">•</span>
                <a href="home.html" class="otras-web">Home</a>
                <span class="separator">•</span>
                <a href="favs.html" class="otras-web">Favoritos</a>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2026 KFK. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
