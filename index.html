<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK - Login</title>
    <link rel="icon" type="image/jpg" href="img/icon.png">
    <link rel="stylesheet" href="loginstyle.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="grain"></div>
    
    <div class="container">
        <div class="content">
            <div class="logo-container">
                <h1 class="logo">Discos y Vinilos KFK</h1>
                <div class="logo-underline"></div>
            </div>
            
            <div class="description">
                <p>Explora nuestro catálogo de música exclusiva y con alta calidad de sonido.</p>
                <p class="tagline">Sumérgete en nuestro mundo audiolirical</p>
            </div>
            
            <div class="notify-section">
                <form id="loginForm">
                    <input type="email" id="emailInput" placeholder="tu@email.com" class="email-input" required>
                    <input type="password" id="passwordInput" placeholder="tu contraseña" class="password-input" required>
                    
                    <button class="notify-btn" id="loginForm" type="submit">Iniciar Sesión</button>
                    <button class="notify-btn" id="removeSesion" type="submit">Cerrar Sesión</button>
                    <button class="notify-btn" id="validateButton" type="button">Validar Contraseña</button>
                </form>
            </div>
            
            <div class="otras-web">
                <a href="rap.html">Rap</a>
                <span class="separator">•</span>
                <a href="home.html">Home</a>
                <span class="separator">•</span>
                <a href="favs.html">Favoritos</a>
            </div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2026 KFK. Todos los derechos reservados.</p>
    </footer>

    <script src="loginscript.js"></script>
</body>
</html>
